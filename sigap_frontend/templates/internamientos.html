{% extends 'layout.html' %}

{% block contenido %}
<div class="intern-container">
    
    <div class="intern-header">
        <div class="intern-title-area">
            <h2>
                <i class="fas fa-bed icon-teal"></i> Control de Internamientos
            </h2>
            <p>Gestión de camas, asignación de pabellones y estado de pacientes hospitalizados.</p>
        </div>
        <button class="btn-intern-primary">
            <i class="fas fa-hospital-user"></i> Registrar Ingreso
        </button>
    </div>

    <div class="intern-stats-grid">
        <div class="stat-card card-occupied">
            <h3>Camas Ocupadas</h3>
            <div class="stat-number">14</div>
        </div>
        <div class="stat-card card-available">
            <h3>Camas Disponibles</h3>
            <div class="stat-number">6</div>
        </div>
        <div class="stat-card card-alert">
            <h3>En Observación</h3>
            <div class="stat-number">3</div>
        </div>
    </div>
    
    </div>
{% endblock %}
