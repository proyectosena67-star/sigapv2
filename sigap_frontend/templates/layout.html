<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.A.P.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Raleway:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='imagen_icono.ico') }}" type="image/x-icon">
</head>
<body>

<div class="app-wrapper">

    <aside class="sidebar">
        <div class="sidebar-logo" style="display: flex; justify-content: center;">
            <div class="logo-icon">
                <img src="{{ url_for('static', filename='imagen_icono.ico') }}" alt="Logo SIGAP" style="width: 100px; height: 100px;">
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="/pacientes" class="nav-item {% if request.path == '/pacientes' %}active{% endif %}">
                <i class="fas fa-user-injured"></i>
                <span>Pacientes</span>
            </a>
            <a href="/historial" class="nav-item {% if request.path == '/historial' %}active{% endif %}">
                <i class="fas fa-notes-medical"></i>
                <span>Historial Clínico</span>
            </a>
            <a href="/evaluaciones" class="nav-item {% if request.path == '/evaluaciones' %}active{% endif %}">
                <i class="fas fa-clipboard-check"></i>
                <span>Evaluaciones</span>
            </a>
            <a href="/internamientos" class="nav-item {% if request.path == '/internamientos' %}active{% endif %}">
                <i class="fas fa-hospital"></i>
                <span>Internamientos</span>
            </a>
            <a href="/medicamentos" class="nav-item {% if request.path == '/medicamentos' %}active{% endif %}">
                <i class="fas fa-pills"></i>
                <span>Medicamentos</span>
            </a>
            <a href="/visitas" class="nav-item {% if request.path == '/visitas' %}active{% endif %}">
                <i class="fas fa-calendar-alt"></i>
                <span>Visitas</span>
            </a>
            <a href="/permisos" class="nav-item {% if request.path == '/permisos' %}active{% endif %}">
                <i class="fas fa-user-shield"></i>
                <span>Permisos</span>
            </a>
            <a href="/usuarios" class="nav-item {% if request.path == '/usuarios' %}active{% endif %}">
                <i class="fas fa-users"></i>
                <span>Usuarios</span>
            </a>
            <a href="/auditoria" class="nav-item {% if request.path == '/auditoria' %}active{% endif %}">
                <i class="fas fa-file-alt"></i>
                <span>Auditoría</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Configuración</span>
            </a>
        </div>
    </aside>

    <div class="main-content">

        <div class="topbar">
            
            <button id="btn-theme" class="topbar-btn icon-only" title="Cambiar Tema">
                <i class="fas fa-moon"></i>
            </button>
            
            <div class="topbar-left-space"></div>

            <div class="topbar-actions" style="display: flex; align-items: center; gap: 16px;">
                
                <button class="topbar-btn-util">
                    <i class="fas fa-bell"></i> Alertas
                </button>
                
                <button class="topbar-btn-util">
                    <i class="fas fa-calendar-alt"></i> Visitas
                </button>
                
                <button class="topbar-btn-envelope">
                    <i class="fas fa-envelope"></i>
                </button>

                <div class="user-profile-widget" style="display: flex; align-items: center; gap: 12px; margin-left: 8px;">
                    <div class="user-profile-info" style="display: flex; flex-direction: column; line-height: 1.2; text-align: right;">
                        <span class="user-name-text">
                            {{ usuario_nombre }}
                        </span>
                        <span class="user-role-text">
                            {{ usuario_rol }}
                        </span>
                    </div>

                    <div class="user-avatar-circle" style="width: 40px; height: 40px; background-color: var(--azul-oscuro); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;">
                        {{ usuario_nombre[0] | upper if usuario_nombre else 'U' }}
                    </div>
                </div>

                <a href="{{ url_for('logout') }}" title="Cerrar Sesión" style="width: 38px; height: 38px; background-color: #fee2e2; color: #dc2626; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; transition: background 0.2s; margin-left: 4px;">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>

        <div class="page-body">
            {% block contenido %}
            {% endblock %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const btnTheme = document.getElementById('btn-theme');
    const icono = btnTheme.querySelector('i');

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        icono.classList.replace('fa-moon', 'fa-sun');
    }

    btnTheme.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        
        if (document.body.classList.contains('dark-mode')) {
            icono.classList.replace('fa-moon', 'fa-sun');
            localStorage.setItem('theme', 'dark');
        } else {
            icono.classList.replace('fa-sun', 'fa-moon');
            localStorage.setItem('theme', 'light');
        }
    });
</script>
</body>
</html>
