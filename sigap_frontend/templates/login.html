<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.A.P. - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Raleway:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-page">

    <div class="login-topbar">
        <div class="logo-icon"></div>
        <div class="logo-text">
            <span class="logo-title"></span>
            <span class="logo-sub"></span>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <img src="{{ url_for('static', filename='imagen_icono.ico') }}" alt="Logo SIGAP" style="width: 200px; height: 200px;">
                </div>
                <div>
                    <div class="login-logo-title"></div>
                    <div class="login-logo-sub"></div>
                </div>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger py-2 text-center" style="font-size: 14px; border-radius: 6px;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/">
                
                <div class="mb-3">
                    <label class="form-label">Usuario / Correo Institucional</label>
                    <input type="email" name="correo" class="form-control login-input" placeholder="...@sigap.com" required>
                </div>
                
                <div class="mb-2">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control login-input" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <div class="mb-4">
                    <small><a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a></small>
                </div>
                
                <button type="submit" class="btn-login w-100 border-0 text-center text-decoration-none">Ingresar</button>
            
            </form>

        </div>
    </div>

</body>
</html>
