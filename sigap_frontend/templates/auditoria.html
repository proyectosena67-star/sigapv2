{% extends 'layout.html' %}

{% block contenido %}
<div class="audit-container">
    
    <div class="audit-header">
        <div class="audit-title-area">
            <h2>
                <i class="fas fa-history icon-carbon"></i> Bitácora de Auditoría (Logs)
            </h2>
            <p>Registro histórico e inmutable de acciones, accesos y modificaciones realizadas en el sistema.</p>
        </div>
        <button class="btn-audit-secondary">
            <i class="fas fa-file-export"></i> Exportar Reporte
        </button>
    </div>

    <div class="audit-summary-strip">
        <div class="strip-item"><i class="fas fa-info-circle text-blue"></i> 1,240 Eventos hoy</div>
        <div class="strip-item"><i class="fas fa-exclamation-circle text-orange"></i> 0 Alertas de seguridad</div>
    </div>
    
    </div>
{% endblock %}
